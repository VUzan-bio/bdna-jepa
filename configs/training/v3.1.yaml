# B-JEPA v3.1 training recipe (reproduce baseline)
version: v3.1

epochs: 100
batch_size: 64
peak_lr: 3.0e-4
warmup_epochs: 10
mixed_precision: true

data_path: data/processed/pretrain_sequences_expanded.csv
checkpoint_dir: outputs/checkpoints/v3.1
save_every: 10
eval_every: 10

use_gradnorm: false
use_fragment_jepa: false
loss_weight_vicreg_var: 10.0
loss_weight_vicreg_cov: 1.0

seed: 42
