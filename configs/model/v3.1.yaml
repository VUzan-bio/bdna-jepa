# B-JEPA v3.1 — 8.5M parameter baseline
# Character-level tokenizer, learned positional encoding

encoder:
  vocab_size: 128        # char-level: A/C/G/T/N + specials
  embed_dim: 384
  num_layers: 6
  num_heads: 6
  ff_dim: 1024
  dropout: 0.1
  max_seq_len: 512
  pos_encoding: learned

predictor:
  depth: 4
  dim: 384               # same width as encoder (no bottleneck)
  num_heads: 6
  ff_dim: 1024
